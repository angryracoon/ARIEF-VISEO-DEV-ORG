<template>
    <lightning-card title="Add an Expense" icon-name="standard:coupon_codes">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template lwc:if={showScanner}>
                <c-receipt-scan-workflow onclose={handleScannerClose}></c-receipt-scan-workflow>
            </template>
            <template lwc:else>
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    Create an expense manually, or scan a receipt and let AI fill in the details for you.
                </p>
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_x-small">
                        <lightning-button
                            variant="neutral"
                            label="Create Manually"
                            icon-name="utility:add"
                            class="slds-button_stretch"
                            onclick={handleCreateManually}>
                        </lightning-button>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_x-small">
                        <lightning-button
                            variant="brand"
                            label="Scan Receipt"
                            icon-name="utility:photo"
                            class="slds-button_stretch"
                            onclick={handleScanReceipt}>
                        </lightning-button>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
